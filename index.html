<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Copa 2026 Audio Edition</title>
<style>
html,body{margin:0;overflow:hidden;background:#222;font-family:Arial}
canvas{display:block}
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;z-index:9999">
<h1>⚽ COPA 2026</h1>
<h2>INSIRA SUA MOEDA OU CÓDIGO</h2>
<div id="codigoView" style="font-size:48px;letter-spacing:10px">______</div>
<div id="msg"></div>
<p>Digite 6 números e pressione ENTER</p>
</div>

<canvas id="game"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize(); addEventListener("resize",resize);

const bg=new Image(); bg.src="background.png";
const personagem=new Image(); personagem.src="personagem.png";
const lousa=new Image(); lousa.src="lousa.png";
const bolaImg=new Image(); bolaImg.src="bola.png";

const musica=new Audio("background.m4a");
musica.loop=true;
musica.volume=0.3;

const somCaptura=new Audio("captura.m4a");
const somDezena=new Audio("dezena.m4a");
const somVitoria=new Audio("vitoria.m4a");
const somDerrota=new Audio("derrota.m4a");

let audioIniciado=false;
function iniciarAudio(){
 if(audioIniciado) return;
 audioIniciado=true;
 musica.play().catch(()=>{});
}

const player={x:700,y:500,w:120,h:120,speed:8};
let left=false,right=false;
let gameOver=false,venceu=false,tempo=150;
let carregando=null,dezenaAtual="";

const missoes=[];
const concluidas=new Set();

while(missoes.length<10){
 let d=String(Math.floor(Math.random()*100)).padStart(2,"0");
 if(!missoes.includes(d)) missoes.push(d);
}

let bolas=[];

function digitosNecessarios(){
 const arr=[];
 for(const d of missoes){
   if(!concluidas.has(d)) arr.push(+d[0],+d[1]);
 }
 return arr;
}

function novaBola(){
 const pool=digitosNecessarios();
 const numero=(Math.random()<0.75&&pool.length)
 ? pool[Math.floor(Math.random()*pool.length)]
 : Math.floor(Math.random()*10);

 return {x:Math.random()*(canvas.width-120),y:-40,numero,speed:2+Math.random()*3,rotacao:0};
}

for(let i=0;i<6;i++) bolas.push(novaBola());

setInterval(()=>{
 if(!jogoLiberado || gameOver) return;
 tempo--;
 if(tempo<=0){
   tempo=0;
   gameOver=true;
   musica.pause();
   somDerrota.play().catch(()=>{});
   
 }
},1000);

addEventListener("keydown",e=>{
 iniciarAudio();
 if(e.key==="ArrowLeft") left=true;
 if(e.key==="ArrowRight") right=true;
});

addEventListener("keyup",e=>{
 if(e.key==="ArrowLeft") left=false;
 if(e.key==="ArrowRight") right=false;
});

canvas.addEventListener("touchstart",e=>{
 iniciarAudio();
 const x=e.touches[0].clientX;
 if(x<innerWidth/2) left=true;
 else right=true;
});

canvas.addEventListener("touchend",()=>{
 left=false;
 right=false;
});

function colide(b){
 const px=player.x+player.w/2;
 const py=player.y+player.h/2;
 return Math.hypot(px-b.x,py-b.y)<60;
}

function update(){
 if(!jogoLiberado || gameOver) return;

 if(left) player.x-=player.speed;
 if(right) player.x+=player.speed;

 player.x=Math.max(0,Math.min(canvas.width-player.w,player.x));

 for(let i=bolas.length-1;i>=0;i--){
   const b=bolas[i];
   b.y+=b.speed;
   b.rotacao+=0.05;

   if(!carregando && colide(b)){
      somCaptura.currentTime=0;
      somCaptura.play().catch(()=>{});

      carregando=b.numero;
      bolas.splice(i,1);
      bolas.push(novaBola());
      continue;
   }

   if(b.y>canvas.height+60){
      bolas.splice(i,1);
      bolas.push(novaBola());
   }
 }

 if(player.x<220 && carregando!==null){
   dezenaAtual+=carregando;
   carregando=null;

   if(dezenaAtual.length===2){

      if(missoes.includes(dezenaAtual)){
         concluidas.add(dezenaAtual);
         somDezena.currentTime=0;
         somDezena.play().catch(()=>{});
      }

      dezenaAtual="";

      if(concluidas.size===10){
         venceu=true;
         gameOver=true;
         musica.pause();
         somVitoria.play().catch(()=>{});

      }
   }
 }
}

function draw(){
 if(bg.complete) ctx.drawImage(bg,0,0,canvas.width,canvas.height);

 if(lousa.complete) ctx.drawImage(lousa,10,10,210,canvas.height-20);

 ctx.fillStyle="white";
 ctx.font="22px Arial";
 ctx.fillText("MISSÃO",65,40);

 for(let i=0;i<missoes.length;i++){
   const d=missoes[i];
   ctx.fillStyle=concluidas.has(d)?"#00ff66":"white";
   ctx.fillText((concluidas.has(d)?"✓ ":"")+d,40,80+i*30);
 }

 ctx.fillStyle="yellow";
 ctx.font="36px Arial";
 ctx.fillText(dezenaAtual.padEnd(2,"_"),70,410);

 for(const b of bolas){
   ctx.save();
   ctx.translate(b.x,b.y);
   ctx.rotate(b.rotacao);
   if(bolaImg.complete) ctx.drawImage(bolaImg,-32,-32,64,64);
   ctx.restore();

   ctx.fillStyle="black";
   ctx.font="bold 22px Arial";
   ctx.textAlign="center";
   ctx.fillText(b.numero,b.x,b.y+8);
   ctx.textAlign="left";
 }

 if(personagem.complete){
   ctx.drawImage(personagem,player.x,player.y,player.w,player.h);
 }

 if(carregando!==null){
   if(bolaImg.complete){
      ctx.drawImage(bolaImg,player.x+35,player.y-35,50,50);
   }
   ctx.fillStyle="#000";
   ctx.font="18px Arial";
   ctx.fillText(carregando,player.x+54,player.y-2);
 }

 const m=Math.floor(tempo/60);
 const s=String(tempo%60).padStart(2,"0");

 ctx.fillStyle="white";
 ctx.font="24px Arial";
 ctx.fillText("Tempo: "+m+":"+s,250,40);
 ctx.fillText("Concluídas: "+concluidas.size+"/10",250,75);

 if(gameOver){
   ctx.fillStyle="rgba(0,0,0,0.88)";
   ctx.fillRect(0,0,canvas.width,canvas.height);
   ctx.fillStyle=venceu?"#00ff66":"#ff4444";
   ctx.font="56px Arial";
   ctx.fillText(venceu?"VOCÊ VENCEU!":"TEMPO ESGOTADO!",40,90);
   ctx.fillStyle="white";
   ctx.font="32px Arial";
   ctx.fillText("APERTE START PARA RECOMEÇAR",40,160);
 }
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

let kioskCodigo="";
let jogoLiberado=false;

function atualizarCodigo(){
 document.getElementById('codigoView').textContent=(kioskCodigo+'______').substring(0,6);
}

function voltarMenu(){
 document.getElementById('loginScreen').style.display='flex';
 kioskCodigo='';
 atualizarCodigo();
 document.getElementById('msg').textContent='';
 jogoLiberado=false;
 gameOver=false;
}

function liberarJogo(){
 document.getElementById('loginScreen').style.display='none';
 jogoLiberado=true;
}

document.addEventListener('keydown',function(e){

 if(!jogoLiberado){

   if(/^[0-9]$/.test(e.key) && kioskCodigo.length<6){
      kioskCodigo+=e.key;
      atualizarCodigo();
   }

   if(e.key==='Backspace'){
      kioskCodigo=kioskCodigo.slice(0,-1);
      atualizarCodigo();
   }

   if(e.key==='Enter'){

      if(kioskCodigo==='999999'){
         liberarJogo();
         return;
      }

      if(kioskCodigo.length!==6){
         document.getElementById('msg').textContent='Código inválido';
         return;
      }

      if(localStorage.getItem('codigo_'+kioskCodigo)){
         document.getElementById('msg').textContent='Código já utilizado';
         return;
      }

      localStorage.setItem('codigo_'+kioskCodigo,'usado');
      liberarJogo();
   }
 }

});
atualizarCodigo();

document.addEventListener("keydown",function(e){
   if(gameOver){
      location.reload();
   }
});

loop();
</script>
</body>
</html>
